<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Blind Cube Trainer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --accent: #00e5ff;
    --accent2: #ff6b35;
    --text: #f0f0f0;
    --muted: #555570;
    --pair-bg: #1a1a2e;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Courier New', monospace;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    user-select: none;
  }

  /* TOP: Ausgabe 1/3 */
  #output-area {
    height: 33dvh;
    display: flex;
    flex-direction: column;
    padding: 10px 12px 6px;
    border-bottom: 1px solid #222235;
    background: var(--surface);
    overflow: hidden;
  }

  #output-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
  }

  #output-header span {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  #clear-btn {
    background: none;
    border: 1px solid #333;
    color: var(--muted);
    padding: 3px 10px;
    border-radius: 4px;
    font-size: 11px;
    cursor: pointer;
    font-family: inherit;
  }
  #clear-btn:active { background: #222; }

  #pairs-display {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    overflow-y: auto;
    flex: 1;
  }

  .pair-chip {
    background: var(--pair-bg);
    border: 1px solid #2a2a45;
    border-radius: 6px;
    padding: 4px 10px;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-width: 52px;
  }

  .pair-letters {
    font-size: 20px;
    font-weight: bold;
    color: var(--accent);
    letter-spacing: 2px;
    line-height: 1.1;
  }

  .pair-word {
    font-size: 9px;
    color: var(--muted);
    letter-spacing: 0.5px;
    margin-top: 1px;
  }

  /* MIDDLE: Aktuelles Paar */
  #current-pair {
    height: 12dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    background: var(--bg);
    border-bottom: 1px solid #1a1a2e;
  }

  #current-letters {
    font-size: 52px;
    font-weight: 900;
    letter-spacing: 8px;
    color: var(--accent);
    font-family: 'Courier New', monospace;
    min-width: 120px;
    text-align: center;
  }

  #current-letters.has-one {
    color: var(--accent2);
  }

  #current-word {
    font-size: 13px;
    color: var(--text);
    opacity: 0.7;
    max-width: 140px;
    text-align: left;
    font-style: italic;
  }

  /* BOTTOM: Tastatur 2/3 - naja ~55vh */
  #keyboard {
    flex: 1;
    display: grid;
    grid-template-rows: repeat(5, 1fr);
    gap: 4px;
    padding: 6px;
    background: var(--bg);
  }

  .key-row {
    display: flex;
    gap: 4px;
    justify-content: center;
  }

  .key {
    flex: 1;
    max-width: 13vw;
    background: #1c1c28;
    border: 1px solid #2a2a3e;
    border-radius: 7px;
    color: var(--text);
    font-size: clamp(14px, 4vw, 20px);
    font-weight: 700;
    font-family: 'Courier New', monospace;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.08s, transform 0.08s;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }

  .key:active {
    background: var(--accent);
    color: var(--bg);
    transform: scale(0.93);
  }

  .key.special {
    background: #1a1a1a;
    border-color: #333;
    font-size: clamp(11px, 3vw, 14px);
    color: var(--muted);
    max-width: 18vw;
  }

  .key.special:active {
    background: var(--accent2);
    color: #fff;
  }
</style>
</head>
<body>

<div id="output-area">
  <div id="output-header">
    <span>Paare</span>
    <button id="clear-btn" onclick="clearAll()">✕ Leeren</button>
  </div>
  <div id="pairs-display"></div>
</div>

<div id="current-pair">
  <div id="current-letters">__</div>
  <div id="current-word"></div>

let current = "";

function tap(letter) {
  if (current.length >= 2) return;
  current += letter;
  updateDisplay();
  if (current.length === 2) {
    // Kurze Verzögerung dann auto-confirm optional — hier manuell per OK
  }
}

function updateDisplay() {
  const el = document.getElementById('current-letters');
  const wordEl = document.getElementById('current-word');

  if (current.length === 0) {
    el.textContent = "__";
    el.className = "";
    wordEl.textContent = "";
  } else if (current.length === 1) {
    el.textContent = current + "_";
    el.className = "has-one";
    wordEl.textContent = "";
  } else {
    el.textContent = current;
    el.className = "";
    const w = words[current] || "?";
    wordEl.textContent = w;
  }
}

function deleteLast() {
  current = current.slice(0, -1);
  updateDisplay();
}

function confirmPair() {
  if (current.length !== 2) return;
  const pair = current;
  const word = words[pair] || "?";
  addChip(pair, word);
  current = "";
  updateDisplay();
}

function addChip(pair, word) {
  const container = document.getElementById('pairs-display');
  const chip = document.createElement('div');
  chip.className = 'pair-chip';
  chip.innerHTML = `<div class="pair-letters">${pair}</div><div class="pair-word">${word}</div>`;
  chip.onclick = () => chip.remove();
  container.appendChild(chip);
  container.scrollTop = container.scrollHeight;
}

function clearAll() {
  document.getElementById('pairs-display').innerHTML = '';
  current = "";
  updateDisplay();
}
